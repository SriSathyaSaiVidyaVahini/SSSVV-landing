name: Update - find - replace

on:
  workflow_dispatch: # Run manually
   

jobs:
  find-replace:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Find and Replace in HTML files
        run: |
          find . -type f -name "*.html" -exec sed -i 's|a href="https://www.linkedin.com/groups/3284128/"|a href="https://www.linkedin.com/company/sri-sathya-sai-vidya-vahini/"|g' {} +
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update linkedin links"
            git push
          fi
