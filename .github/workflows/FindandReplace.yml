name: Update - find - replace

on:
  workflow_dispatch: # Run manually
   

jobs:
  update-copyright:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Find and Replace in HTML files
        run: |
          find . -type f -name "*.html" -exec sed -i 's|a href="https://www.facebook.com/srisathyasaividyavahini"|a href="https://www.facebook.com/profile.php?id=61587747644525"|g' {} +
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update facebook links"
            git push
          fi
